<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JurisLens - AI Legal Summarizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Cormorant Garamond', 'serif'],
              display: ['Playfair Display', 'serif'],
              cinzel: ['Cinzel', 'serif'], 
            },
            backgroundImage: {
              'noise': "url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22 opacity=%220.05%22/%3E%3C/svg%3E')",
              'gold-gradient': 'linear-gradient(135deg, #b45309 0%, #fbbf24 50%, #b45309 100%)',
              'silver-gradient': 'linear-gradient(135deg, #e2e8f0 0%, #94a3b8 50%, #e2e8f0 100%)',
            },
            animation: {
              'gavel-strike': 'gavelStrike 1.5s ease-in-out infinite',
              'spark': 'spark 1.5s ease-in-out infinite',
              'shockwave': 'shockwave 1.5s ease-in-out infinite',
              'shine': 'shine 3s linear infinite',
              'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
            },
            keyframes: {
              gavelStrike: {
                '0%': { transform: 'rotateX(-45deg)' },
                '30%': { transform: 'rotateX(10deg)' }, // Hit
                '40%': { transform: 'rotateX(0deg)' },   // Settle
                '100%': { transform: 'rotateX(-45deg)' }, // Reset
              },
              spark: {
                 '0%, 25%': { opacity: '0', transform: 'scale(0)' },
                 '30%': { opacity: '1', transform: 'scale(1.5)' }, // Flash on hit
                 '50%': { opacity: '0', transform: 'scale(0.5)' },
                 '100%': { opacity: '0' }
              },
              shockwave: {
                '0%, 29%': { transform: 'scale(0)', opacity: '0' },
                '30%': { transform: 'scale(0.8)', opacity: '1' },
                '100%': { transform: 'scale(2.5)', opacity: '0' },
              },
              shine: {
                '0%': { backgroundPosition: '200% center' },
                '100%': { backgroundPosition: '-200% center' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            },
            colors: {
              navy: {
                800: '#1e293b',
                900: '#0f172a',
                950: '#020617', 
              },
              gold: {
                400: '#fbbf24',
                500: '#f59e0b',
                600: '#d97706', 
                700: '#b45309',
              },
              silver: {
                300: '#cbd5e1',
                400: '#94a3b8',
                500: '#64748b',
                100: '#f1f5f9',
              },
              parchment: {
                50: '#fdfbf7',
                100: '#f7f3e8',
                200: '#efe8d3',
              },
              ink: {
                900: '#1a1a1a', 
              },
              neon: {
                green: '#39ff14',
                yellow: '#efff04',
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0f172a;
        background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #020617 100%);
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0f172a; 
      }
      ::-webkit-scrollbar-thumb {
        background: #334155; 
        border-radius: 4px;
        border: 1px solid #0f172a;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #475569; 
      }
      .text-shine {
        background: linear-gradient(to right, #b45309 20%, #fbbf24 40%, #fbbf24 60%, #b45309 80%);
        background-size: 200% auto;
        color: transparent;
        -webkit-background-clip: text;
        background-clip: text;
      }
      .text-silver-shine {
        background: linear-gradient(to right, #64748b 20%, #e2e8f0 40%, #f8fafc 60%, #64748b 80%);
        background-size: 200% auto;
        color: transparent;
        -webkit-background-clip: text;
        background-clip: text;
      }
      .transform-style-3d {
        transform-style: preserve-3d;
      }
      .perspective-1000 {
        perspective: 1000px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>

</head>

    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
